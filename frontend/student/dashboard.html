<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard — KRB School</title>
    <link rel="stylesheet" href="../admin/form.css">
    <link rel="stylesheet" href="../confirm.css">
    <link rel="stylesheet" href="student.css">
</head>

<body>
    <div class="page">

        <div class="dash-header">
            <div>
                <div class="school-name">KRB School</div>
                <div class="today-date" id="todayDate">—</div>
            </div>
        </div>

        <!-- Student Info Card -->
        <div class="student-info-card" id="studentCard">
            <div class="student-avatar" id="studentAvatar">?</div>
            <div class="student-info">
                <div class="student-name" id="studentName">—</div>
                <div class="student-meta" id="studentMeta">—</div>
            </div>
            <div class="fee-pill" id="feePill">—</div>
        </div>

        <!-- Quick Cards -->
        <div class="quick-grid">
            <div class="quick-card" onclick="window.location.href='homework.html'">
                <div class="quick-icon">✎</div>
                <div class="quick-label">Homework</div>
                <div class="quick-sub" id="hwCount">—</div>
            </div>
            <div class="quick-card" onclick="window.location.href='notices.html'">
                <div class="quick-icon">📢</div>
                <div class="quick-label">Notices</div>
                <div class="quick-sub" id="noticeCount">—</div>
            </div>
            <div class="quick-card" onclick="window.location.href='results.html'">
                <div class="quick-icon">★</div>
                <div class="quick-label">Results</div>
                <div class="quick-sub">View</div>
            </div>
            <div class="quick-card" onclick="window.location.href='papers.html'">
                <div class="quick-icon">◫</div>
                <div class="quick-label">Papers</div>
                <div class="quick-sub">Download</div>
            </div>
        </div>

        <!-- Latest Homework -->
        <div class="section-header">
            <div class="section-title">Latest Homework</div>
            <a href="homework.html" class="view-all-link">View all →</a>
        </div>
        <div id="hwList">
            <div class="dash-loading">Loading...</div>
        </div>

        <!-- Latest Notice -->
        <div class="section-header" style="margin-top:28px;">
            <div class="section-title">Latest Notice</div>
            <a href="notices.html" class="view-all-link">View all →</a>
        </div>
        <div id="noticeList">
            <div class="dash-loading">Loading...</div>
        </div>

    </div>

    <div class="toast" id="toast"></div>

    <script src="../config.js"></script>
    <script src="../auth.js"></script>
    <script src="../confirm.js"></script>
    <script src="student-menu.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
