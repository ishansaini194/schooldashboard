<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — KRB School</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="../confirm.css">
</head>

<body>
    <div class="page">
        <div class="page-header">
            <h1>Reset Password</h1>
            <p>Reset password for any student or teacher</p>
        </div>

        <div class="form-card">
            <div class="form-section">
                <div class="section-title">Find User</div>
                <div class="form-grid">
                    <div class="field span2">
                        <label>ePunjab ID / Username</label>
                        <input type="text" id="searchId" placeholder="e.g. EP2024001 or TCH001">
                    </div>
                </div>
                <div class="form-footer" style="margin-top:16px;">
                    <button type="button" onclick="searchUser()">Search</button>
                </div>
            </div>

            <div id="userFound" style="display:none;">
                <hr style="border:none; border-top:1px solid var(--border); margin:24px 0;">
                <div class="form-section">
                    <div class="section-title">Reset Password</div>
                    <div id="userInfo" style="margin-bottom:16px;"></div>
                    <div class="form-grid">
                        <div class="field span2">
                            <label>New Password</label>
                            <input type="password" id="newPassword" placeholder="Enter new password">
                        </div>
                    </div>
                    <div class="form-footer" style="margin-top:16px;">
                        <button type="button" onclick="resetPassword()">Reset Password</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../config.js"></script>
    <script src="../auth.js"></script>
    <script src="../confirm.js"></script>
    <script src="../menu.js"></script>
    <script src="reset-password.js"></script>
</body>

</html>
