<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collect Fee</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="../confirm.css">
    <link rel="stylesheet" href="fees.css">
</head>
<body>

    <div class="page">
        <div class="page-header">
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div>
                    <h1>Collect Fee</h1>
                    <p>Enter payment details below</p>
                </div>
                <button class="btn-secondary" onclick="history.back()">← Back</button>
            </div>
        </div>

        <div class="form-card">
            <form id="feeForm">

                <!-- Student Search -->
                <div class="form-section">
                    <div class="section-title">Student</div>
                    <div class="search-wrapper">
                        <input type="text" id="studentSearch"
                               placeholder="Search by name, roll no or ePunjab ID..."
                               oninput="searchStudents()" autocomplete="off">
                        <div id="searchDropdown" class="search-dropdown hidden"></div>
                    </div>

                    <!-- Selected Student Card -->
                    <div id="selectedStudentCard" class="selected-student hidden">
                        <div class="ss-avatar" id="ssAvatar">?</div>
                        <div class="ss-info">
                            <div class="ss-name" id="ssName">—</div>
                            <div class="ss-meta" id="ssMeta">—</div>
                        </div>
                        <button type="button" class="ss-clear" onclick="clearStudent()">✕</button>
                    </div>

                    <input type="hidden" id="studentId">
                    <input type="hidden" id="studentEpunjab">
                    <input type="hidden" id="studentName">
                    <input type="hidden" id="studentClass">
                </div>

                <!-- Fee Details -->
                <div class="form-section">
                    <div class="section-title">Fee Details</div>
                    <div class="form-grid">
                        <div class="field">
                            <label>Fee Type</label>
                            <select id="feeType" onchange="updateBaseAmount()">
                                <option value="tuition">Tuition Fee</option>
                                <option value="transport">Transport Fee</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Month</label>
                            <select id="feeMonth">
                                <option value="January">January</option>
                                <option value="February">February</option>
                                <option value="March">March</option>
                                <option value="April">April</option>
                                <option value="May">May</option>
                                <option value="June">June</option>
                                <option value="July">July</option>
                                <option value="August">August</option>
                                <option value="September">September</option>
                                <option value="October">October</option>
                                <option value="November">November</option>
                                <option value="December">December</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Year</label>
                            <select id="feeYear"></select>
                        </div>
                        <div class="field">
                            <label>Base Amount (₹)</label>
                            <input type="number" id="baseAmount" placeholder="0" oninput="calcFinal()">
                        </div>
                        <div class="field">
                            <label>Discount (₹)</label>
                            <input type="number" id="discount" placeholder="0" value="0" oninput="calcFinal()">
                        </div>
                        <div class="field">
                            <label>Discount Reason</label>
                            <input type="text" id="discountReason" placeholder="e.g. Sibling discount">
                        </div>
                    </div>
                </div>

                <!-- Payment -->
                <div class="form-section">
                    <div class="section-title">Payment</div>
                    <div class="form-grid">
                        <div class="field">
                            <label>Final Amount (₹)</label>
                            <input type="number" id="finalAmount" placeholder="0" readonly
                                   style="background: var(--bg); color: var(--accent); font-weight:600;">
                        </div>
                        <div class="field">
                            <label>Paying Now (₹)</label>
                            <input type="number" id="paidAmount" placeholder="0" oninput="calcRemaining()">
                        </div>
                        <div class="field">
                            <label>Remaining (₹)</label>
                            <input type="number" id="remaining" placeholder="0" readonly
                                   style="background: var(--bg);">
                        </div>
                        <div class="field">
                            <label>Due Date (if partial)</label>
                            <input type="date" id="dueDate">
                        </div>
                    </div>

                    <!-- Status indicator -->
                    <div class="payment-status" id="paymentStatus"></div>
                </div>

                <div class="form-footer">
                    <button type="button" class="btn-secondary" onclick="history.back()">Cancel</button>
                    <button type="submit" class="btn-primary">Generate Receipt</button>
                </div>

            </form>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../config.js"></script> 
    <script src="../auth.js"></script>
    <script src="../confirm.js"></script>
    <script src="../menu.js"></script>
    <script src="fee-collect.js"></script>
</body>
</html>
