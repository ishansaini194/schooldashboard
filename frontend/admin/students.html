<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="../confirm.css">
    <link rel="stylesheet" href="students.css">
</head>

<body>

    <div class="page">

        <!-- Normal Header -->
        <div class="page-header" id="normalHeader"
            style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div>
                <h1>Students</h1>
                <p id="pageSubtitle">Loading...</p>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-secondary" onclick="window.location.href='class.html'">← Back</button>
                <button class="btn-primary" onclick="window.location.href='form.html?class=' + classId + '&section=' + encodeURIComponent(sectionId)">+ Add
                    Student</button>
            </div>
        </div>

        <!-- Class Summary Bar -->
        <div class="class-summary-bar" id="classSummary">
            <div class="cs-class">Loading...</div>
        </div>

        <!-- Selection Header -->
        <div class="select-header hidden" id="selectHeader">
            <div class="select-header-left">
                <button class="cancel-btn" onclick="exitSelectionMode()">✕ Cancel</button>
                <span class="selected-count" id="selectedCount">Select students</span>
            </div>
            <div class="select-header-right">
                <button class="select-all-btn" id="selectAllBtn" onclick="selectAll()">Select All</button>
                <button class="download-btn" id="downloadBtn" onclick="downloadCSV()" disabled>
                    ↓ Download CSV
                </button>
            </div>
        </div>

        <!-- Hint -->
        <div class="select-hint" id="selectHint">
            <span>💡 Long press or right-click a row to select</span>
        </div>

        <!-- Student List -->
        <div id="studentList" class="student-list">
            <div class="empty-state">Loading students...</div>
        </div>

    </div>

    <!-- Field Picker Modal -->
    <div id="fieldPickerModal" class="modal-overlay">
        <div class="modal field-picker-modal">
            <div class="modal-header">
                <div>
                    <h3>Choose Fields</h3>
                    <p class="modal-subtitle">Select which columns to include</p>
                </div>
                <button class="modal-close" onclick="closeFieldPicker()">✕</button>
            </div>
            <div class="field-picker-toolbar">
                <button class="toggle-all-btn" id="fieldToggleAllBtn" onclick="toggleAllFields()">Deselect All</button>
            </div>
            <div class="field-grid" id="fieldGrid"></div>
            <div class="field-picker-footer">
                <button class="btn-cancel" onclick="closeFieldPicker()">Cancel</button>
                <button class="btn-confirm" id="confirmDownloadBtn" onclick="confirmDownload()">Download</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../config.js"></script>
    <script src="../auth.js"></script>
    <script src="../confirm.js"></script>
    <script src="../menu.js"></script>
    <script src="students.js"></script>
</body>

</html>
