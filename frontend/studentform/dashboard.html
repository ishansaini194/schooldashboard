<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — KRB School</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="dashboard.css">
</head>

<body>

    <div class="page">

        <!-- Header -->
        <div class="dash-header">
            <div class="dash-header-left">
                <div class="school-name">KRB School</div>
                <div class="today-date" id="todayDate">—</div>
            </div>
            <div class="month-nav">
                <button class="month-btn" onclick="changeMonth(-1)">←</button>
                <span class="month-label" id="monthLabel">—</span>
                <button class="month-btn" onclick="changeMonth(1)">→</button>
            </div>
        </div>

        <!-- Alert Banner -->
        <div class="alert-banner hidden" id="alertBanner">
            <span class="alert-icon">⚠</span>
            <span id="alertText">—</span>
            <button class="alert-link" onclick="window.location.href='fees.html'">View →</button>
        </div>

        <!-- Stat Cards -->
        <div class="stat-grid">
            <div class="stat-card" onclick="window.location.href='class.html'" style="cursor:pointer">
                <div class="stat-icon">✦</div>
                <div class="stat-value" id="statStudents">—</div>
                <div class="stat-label">Students</div>
            </div>
            <div class="stat-card" onclick="window.location.href='class.html'" style="cursor:pointer">
                <div class="stat-icon">◫</div>
                <div class="stat-value" id="statClasses">—</div>
                <div class="stat-label">Classes</div>
            </div>
            <div class="stat-card accent" onclick="window.location.href='fees.html'" style="cursor:pointer">
                <div class="stat-icon">₹</div>
                <div class="stat-value" id="statCollected">—</div>
                <div class="stat-label">Collected</div>
            </div>
            <div class="stat-card warning" onclick="window.location.href='fees.html'" style="cursor:pointer">
                <div class="stat-icon">!</div>
                <div class="stat-value" id="statPending">—</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="section-header">
            <div class="section-title">Quick Actions</div>
        </div>
        <div class="quick-actions">
            <button class="action-btn" onclick="window.location.href='form.html'">
                <span class="action-icon">+</span>
                <span>Add Student</span>
            </button>
            <button class="action-btn primary" onclick="window.location.href='fee-collect.html'">
                <span class="action-icon">₹</span>
                <span>Collect Fee</span>
            </button>
            <button class="action-btn" onclick="window.location.href='class.html'">
                <span class="action-icon">◫</span>
                <span>Classes</span>
            </button>
            <button class="action-btn" onclick="window.location.href='fees.html'">
                <span class="action-icon">📋</span>
                <span>Fee Report</span>
            </button>
        </div>

        <!-- Class Fee Progress -->
        <div class="section-header">
            <div class="section-title">Class-wise Fee Status</div>
            <div class="section-sub" id="progressMonthLabel">—</div>
        </div>
        <div class="class-progress-list" id="classProgressList">
            <div class="dash-loading">Loading...</div>
        </div>

        <!-- Pending & Partial -->
        <div class="section-header" style="margin-top:28px;">
            <div class="section-title">Pending & Partial</div>
            <div class="pending-export-btns">
                <button class="export-btn" onclick="exportPendingCSV()">↓ CSV</button>
                <button class="export-btn" onclick="exportPendingPDF()">🖨 PDF</button>
            </div>
        </div>
        <div class="pending-list" id="pendingList">
            <div class="dash-loading">Loading...</div>
        </div>
        <div class="pending-footer">
            <button class="view-all-btn" onclick="window.location.href='fees.html'">View All in Fee Manager →</button>
        </div>

        <!-- Recent Payments -->
        <div class="section-header" style="margin-top:28px;">
            <div class="section-title">Recent Payments</div>
        </div>
        <div class="recent-list" id="recentList">
            <div class="dash-loading">Loading...</div>
        </div>

    </div>

    <!-- PDF Print area (hidden) -->
    <div id="pdfPrintArea" class="pdf-print-area no-print"></div>

    <div class="toast" id="toast"></div>

    <script src="../menu.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
