<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <!-- Menu Button -->
    <button id="menuBtn">☰</button>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>School Panel</h2>
            <p>Management System</p>
        </div>
        <ul>
            <li onclick="window.location.href='dashboard.html'">
                <span class="icon">⊞</span> Dashboard
            </li>
            <li onclick="window.location.href='classes.html'">
                <span class="icon">◫</span> Classes
            </li>
            <li class="active">
                <span class="icon">✦</span> Students
            </li>
        </ul>
    </div>

    <!-- Overlay -->
    <div id="overlay"></div>

    <!-- Page -->
    <div class="page">
        <div class="page-header">
            <h1>Add New Student</h1>
            <p>Fill in the details below to register a student</p>
        </div>

        <div class="form-card">
            <form id="studentForm">

                <!-- Basic Info -->
                <div class="form-section">
                    <div class="section-title">Basic Information</div>
                    <div class="form-grid">
                        <div class="field span2">
                            <label>Full Name</label>
                            <input type="text" name="name" placeholder="e.g. Rahul Singh" required>
                        </div>
                        <div class="field">
                            <label>Class</label>
                            <input type="number" name="class_id" placeholder="e.g. 6">
                        </div>
                        <div class="field">
                            <label>Section</label>
                            <input type="text" name="section" placeholder="e.g. A">
                        </div>
                        <div class="field">
                            <label>Roll No</label>
                            <input type="text" name="roll_no" placeholder="e.g. 001">
                        </div>
                        <div class="field">
                            <label>Gender</label>
                            <select name="gender">
                                <option value="">Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Date of Birth</label>
                            <input type="date" name="dob">
                        </div>
                        <div class="field">
                            <label>Phone</label>
                            <input type="text" name="phone" placeholder="e.g. 9876543210">
                        </div>
                    </div>
                </div>

                <!-- ID Details -->
                <div class="form-section">
                    <div class="section-title">ID Details</div>
                    <div class="form-grid">
                        <div class="field">
                            <label>Aadhar No</label>
                            <input type="text" name="aadhar_no" placeholder="12-digit number">
                        </div>
                        <div class="field">
                            <label>ePunjab ID</label>
                            <input type="text" name="epunjab_id" placeholder="ePunjab ID">
                        </div>
                    </div>
                </div>

                <!-- Parent Info -->
                <div class="form-section">
                    <div class="section-title">Parent Information</div>
                    <div class="form-grid">
                        <div class="field">
                            <label>Father's Name</label>
                            <input type="text" name="father_name" placeholder="Father's full name">
                        </div>
                        <div class="field">
                            <label>Father's Contact</label>
                            <input type="text" name="father_contact" placeholder="Phone number">
                        </div>
                        <div class="field">
                            <label>Father's Aadhar</label>
                            <input type="text" name="father_aadhar" placeholder="12-digit number">
                        </div>
                        <div class="field">
                            <label>Mother's Name</label>
                            <input type="text" name="mother_name" placeholder="Mother's full name">
                        </div>
                        <div class="field">
                            <label>Mother's Contact</label>
                            <input type="text" name="mother_contact" placeholder="Phone number">
                        </div>
                        <div class="field">
                            <label>Caste</label>
                            <input type="text" name="caste" placeholder="e.g. General">
                        </div>
                    </div>
                </div>

                <!-- Other -->
                <div class="form-section">
                    <div class="section-title">Other Details</div>
                    <div class="form-grid">
                        <div class="field span2">
                            <label>Address</label>
                            <input type="text" name="address" placeholder="Full address">
                        </div>
                        <div class="field span2">
                            <label>Previous School Details</label>
                            <input type="text" name="previous_school_details"
                                placeholder="Previous school name and class">
                        </div>
                    </div>
                </div>

                <div class="form-footer">
                    <button type="reset">Clear</button>
                    <button type="submit">Add Student</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // Sidebar
        const menuBtn = document.getElementById('menuBtn')
        const sidebar = document.getElementById('sidebar')
        const overlay = document.getElementById('overlay')

        menuBtn.addEventListener('click', () => {
            sidebar.classList.toggle('open')
            overlay.classList.toggle('show')
        })

        overlay.addEventListener('click', () => {
            sidebar.classList.remove('open')
            overlay.classList.remove('show')
        })

        // Toast
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast')
            toast.textContent = msg
            toast.className = `toast ${type} show`
            setTimeout(() => toast.classList.remove('show'), 3000)
        }

        // Submit
        document.getElementById('studentForm').addEventListener('submit', async function (e) {
            e.preventDefault()

            const formData = new FormData(this)
            const data = {}
            formData.forEach((value, key) => { data[key] = value })
            data.class_id = parseInt(data.class_id) || 0

            const response = await fetch('http://localhost:8080/api/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })

            const result = await response.json()

            if (response.ok) {
                showToast('Student added successfully!')
                this.reset()
            } else {
                showToast('Error: ' + result.error, 'error')
            }
        })
    </script>

</body>

</html>
