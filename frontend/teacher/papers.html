<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library — KRB School</title>
    <link rel="stylesheet" href="../admin/form.css">
    <link rel="stylesheet" href="../confirm.css">
    <link rel="stylesheet" href="teacher.css">
</head>

<body>
    <div class="page">
        <div class="page-header">
            <h1>Library</h1>
            <p>All your school material here</p>
        </div>

        <div class="form-card" style="margin-bottom:24px;">
            <div class="form-section">
                <div class="section-title">Add New Paper</div>
                <div class="form-grid">
                    <div class="field">
                        <label>Class</label>
                        <select id="paperClass">
                            <option value="">Select class</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Section</label>
                        <select id="paperSection">
                            <option value="">All</option>
                            <option>A</option>
                            <option>B</option>
                            <option>C</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Subject</label>
                        <select id="paperSubject">
                            <option value="">Select subject</option>
                            <option>Math</option>
                            <option>Science</option>
                            <option>English</option>
                            <option>Hindi</option>
                            <option>Social Science</option>
                            <option>Punjabi</option>
                            <option>Computer</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Exam Type</label>
                        <select id="paperExamType">
                            <option value="midterm">Mid-term</option>
                            <option value="final">Final</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Year</label>
                        <input type="number" id="paperYear" value="2025">
                    </div>
                    <div class="field span2">
                        <label>Google Drive Link</label>
                        <input type="url" id="paperLink" placeholder="https://drive.google.com/file/d/...">
                    </div>
                </div>
            </div>
            <div class="form-footer">
                <button type="button" onclick="addPaper()">Add Paper</button>
            </div>
        </div>

        <div class="section-header">
            <div class="section-title">All Papers</div>
        </div>
        <div id="paperList">
            <div class="dash-loading">Loading...</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../config.js"></script>
    <script src="../auth.js"></script>
    <script src="../confirm.js"></script>
    <script src="teacher-menu.js"></script>
    <script src="papers.js"></script>
</body>

</html>
